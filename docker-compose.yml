services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oneshot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oneshot}
      POSTGRES_DB: ${POSTGRES_DB:-oneshot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oneshot}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GIRL_NAME: ${GIRL_NAME:-Aimaral}
      # Inside the compose network the database host is "db", not localhost.
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-oneshot}:${POSTGRES_PASSWORD:-oneshot}@db:5432/${POSTGRES_DB:-oneshot}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      SESSION_SECRET: ${SESSION_SECRET:-please-change-me}
    ports:
      # Bind to localhost only — in prod Caddy reaches "web:8000" over the compose
      # network, so the app is never exposed directly. (Docker would otherwise
      # bypass ufw and publish 8000 to the whole internet.)
      - "127.0.0.1:8000:8000"

volumes:
  pgdata:
